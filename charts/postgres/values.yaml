replicaCount: 1

image:
  repository: postgres
  tag: "18-alpine"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

auth:
  createSecret: true  # set to false when using SealedSecrets
  username: etherpad
  password: "CHANGE_ME"  # Must be overridden in production
  database: etherpad

persistence:
  storageClassName: ""
  size: 1Gi

resources: {}

startupProbe:
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 5

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 6
  timeoutSeconds: 5

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 6
  timeoutSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}
